name: Playwright Cucumber Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # allows manual trigger from GitHub UI
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      tags:
        description: 'Cucumber tags to run e.g. @smoke'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven          # caches maven dependencies between runs

      - name: Install Playwright browsers
        run: |
          mvn exec:java -e \
          -D exec.mainClass=com.microsoft.playwright.CLI \
          -D exec.args="install --with-deps chromium" \
          -D exec.classpathScope=test

      - name: Run tests
        run: |
          mvn test \
          -Dheadless=true \
          -Dslowmo=0 \
          -Dbase.url=${{ secrets.BASE_URL }} \
          -Denv=${{ github.event.inputs.env || 'staging' }} \
          ${{ github.event.inputs.tags && format('-Dcucumber.filter.tags={0}', github.event.inputs.tags) || '' }}

      - name: Publish Cucumber report
        uses: actions/upload-artifact@v4
        if: always()          # upload even if tests fail
        with:
          name: cucumber-report
          path: target/cucumber-reports/report.html
          retention-days: 30

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()         # only upload on failure
        with:
          name: failure-screenshots
          path: target/screenshots/*.png
          retention-days: 7

      - name: Publish JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/*.xml
